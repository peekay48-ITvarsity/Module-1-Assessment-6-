<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Product Catalogue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Our Top Products</h1>
    </header>
    
    <section class="catalog-grid">
        <!-- Product 1 -->
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product 1">
            <div class="product-info">
                <h3>Wireless Headphones</h3>
                <p class="price">$99.99</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </article>

        <!-- Product 2 -->
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product 2">
            <div class="product-info">
                <h3>Smart Watch</h3>
                <p class="price">$149.99</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </article>

        <!-- Product 3 -->
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product 3">
            <div class="product-info">
                <h3>Portable Speaker</h3>
                <p class="price">$59.99</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </article>

        <!-- Product 4 -->
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product 4">
            <div class="product-info">
                <h3>Mechanical Keyboard</h3>
                <p class="price">$120.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </article>

        <!-- Product 5 -->
        <article class="product-card">
            <img src="https://placeholder.com" alt="Product 5">
            <div class="product-info">
                <h3>Ergonomic Mouse</h3>
                <p class="price">$45.50</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </article>
    </section>
</body>
</html>
