<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1-0">
    <title>Simple Cart</title>
    <!-- Link to your CSS file -->
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> 
       <h1>Welcome To Our Store</h1>
       <a href="cart.html">View Cart (<span id="cart-item count ">0</span>)</a>
    </header>

     <main id="product list">
        <!-- Product items would be dynamically generated here using JavaScript or hardcode like below -->
         <div class="product-card">
            <h2>Apple Juice</h2>
            <p class="product-price">R48,71</p>
            <button onclick="addToCart({id: 1, name: 'Apple Juice', price: 48.71})">Add to cart</button>
        <div>

        <div class="product-card">
            <h2>Door</h2>
            <p class="product price">R2606,24</p>
            <button onclick="addToCart"({id: 2, name: 'Door', price: 2606.24})>Add to cart</button>
        </div>

        <!--More Products...-->
    </main>

    <!--Link to your JavaScript file-->
    <script src="script.js"></script>
    <body>
    </html>
